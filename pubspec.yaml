name: fruits_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3
  intl: ^0.20.2
  dots_indicator: ^4.0.1
  shared_preferences: ^2.5.4
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  dartz: ^0.10.1
  get_it: ^9.2.0
  flutter_bloc: ^9.1.1
  modal_progress_hud_nsn: ^0.5.1
  toastification: ^3.0.3
  google_sign_in: ^7.2.0
  flutter_dotenv: ^6.0.0
  cloud_firestore: ^6.1.2
  flutter_svg_provider: ^1.0.7
  skeletonizer: ^2.1.3
  cached_network_image_ce: ^4.6.2
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  equatable: ^2.0.8
  meta: ^1.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  hive_ce_generator: ^1.11.1
  build_runner: ^2.12.2

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/bottom_nav_bar/
    - .env

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter_assets:
  assets_path: assets/images/
  output_path: lib/core/utils/styles/
  filename: app_images.dart
  field_prefix: null
  ignore_comments: true
  classname: AppImages

flutter_intl:
  enabled: true
  arb_dir: lib/core/l10n/arb
  output_dir: lib/core/l10n
  output_filename: app_localizations.dart
  class_name: AppLocalizations